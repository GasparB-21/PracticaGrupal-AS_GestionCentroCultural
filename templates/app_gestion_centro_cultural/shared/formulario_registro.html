{% block content %}
  {% if referer %}
    <a href="{{ referer }}" style="display: inline-block; margin-bottom: 12px; padding: 8px 12px; background-color: #4b5563; color: #ffffff; text-decoration: none; border-radius: 6px;">
      ← Volver
    </a>
  {% endif %}

  <h2>{{ titulo }}</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Guardar</button>
  </form>
  
{% endblock %}
