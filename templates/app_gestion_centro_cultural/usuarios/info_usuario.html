<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Información del usuario</title>
    </head>

    <body>
        {% if usuario %}
            <h1>Información del usuario</h1>

            <!-- Card usuario -->
            <div>
                <h3><strong>Nombre:</strong> {{ usuario.nombre }}</h3>

                <p><strong>Edad:</strong> {{ usuario.edad }}</p>

                <p><strong>Email:</strong> {{ usuario.email }}</p>

                <p><strong>Teléfono:</strong> {{ usuario.telefono }}</p>

                <a href="{% url 'editar_usuario' usuario.id %}" style="text-decoration: none;">✏️</a>
                
                <form method="POST" action="{% url 'confirmar_eliminar_usuario' usuario.id %}">
                    {% csrf_token %}
                    <button type="submit" name="eliminar" value="si">🗑️</button>
                </form>
            </div>
        {% else %}
            <h1>Usuario no encontrado</h1>
        {% endif %}
    </body>
</html>
