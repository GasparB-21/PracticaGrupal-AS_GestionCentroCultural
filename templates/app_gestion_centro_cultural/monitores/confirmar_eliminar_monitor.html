<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar eliminación</title>
</head>
<body>
    <h1>Confirmar eliminación</h1>
    <p>¿Estás seguro de que quieres eliminar al monitor "{{ monitor.nombre }}"?</p>
    <form method="POST" action="{% url 'confirmar_eliminar_monitor' monitor.id %}">
        {% csrf_token %}
        <button type="submit" name="confirmar" value="si">Sí, eliminar</button>
    </form>
    <a href="{{ referer }}">No, volver</a>
</body>
</html>
